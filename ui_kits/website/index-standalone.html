<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Збір ЛНМУ — Фонд «Освіта. Наука. Медицина»</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<meta name="ext-resource-dependency" content="assets/logo-mark.png" data-resource-id="logoMark" />
<meta name="ext-resource-dependency" content="assets/poster-lnmu.jpg" data-resource-id="posterLnmu" />
<style>
  html, body { margin: 0; }
  body { background: var(--cc-cream); color: var(--cc-text); font-family: var(--cc-font-body); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--cc-teal-soft); }
  html { scroll-behavior: smooth; }
  image-slot { --is-bg: var(--cc-cream-2); }
  @keyframes ccFade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes ccMeter { from { transform: scaleX(0) } to { transform: scaleX(1) } }
  @keyframes ccPop { from { opacity: 0; transform: translateY(10px) scale(.98) } to { opacity: 1; transform: none } }
  @media (prefers-reduced-motion: no-preference) {
    .cc-anim .cc-reveal { opacity: 0; transform: translateY(18px); transition: opacity .65s ease, transform .65s cubic-bezier(.2,.7,.2,1); }
    .cc-anim .cc-reveal.is-in { opacity: 1; transform: translateY(0); }
    .cc-anim .cc-meter-anim { transform: scaleX(0); transform-origin: 0 50%; transition: transform 1.1s cubic-bezier(.2,.7,.2,1) .15s; }
    .cc-anim .cc-meter-anim.is-in { transform: scaleX(1); }
  }
  .cc-burger { display: none; }
  @media (max-width: 880px) {
    .cc-desk-nav { display: none !important; }
    .cc-burger { display: grid !important; place-items: center; }
    .cc-hero-copy { order: 1; }
    .cc-hero-card { order: 2; }
    section [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 760px) {
    .cc-why-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="motion.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="header-hero.jsx"></script>
<script type="text/babel" src="sections-about.jsx"></script>
<script type="text/babel" src="sections-trust.jsx"></script>
<script type="text/babel" src="donate-modal.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroStyle": "paper",
  "ctaColor": "teal",
  "animations": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [modal, setModal] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const on = () => setScrolled(window.scrollY > 24);
    on(); window.addEventListener('scroll', on, { passive: true });
    return () => window.removeEventListener('scroll', on);
  }, []);
  const data = window.CC_DATA;
  const accent = t.ctaColor === 'blue' ? 'primary' : 'donate';
  const motionOn = t.animations !== false && !window.ccHiddenAtLoad;
  const openModal = () => setModal(true);

  return (
    <CCMotionCtx.Provider value={motionOn}>
    <div className={'cc-root' + (motionOn ? ' cc-anim' : '')}>
      <Header data={data} accent={accent} onDonate={openModal} scrolled={scrolled} />
      <Hero data={data} accent={accent} heroStyle={t.heroStyle} onDonate={openModal} />
      <CollectionSection data={data} />
      <FundSection data={data} />
      <TransparencySection data={data} />
      <ContactsSection data={data} accent={accent} onDonate={openModal} />
      <Footer data={data} />
      <DonateModal data={data} accent={accent} open={modal} onClose={() => setModal(false)} />

      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakRadio label="Стиль hero" value={t.heroStyle} options={['paper', 'dramatic']}
          onChange={(v) => setTweak('heroStyle', v)} />
        <TweakSection label="Заклик до дії" />
        <TweakRadio label="Колір CTA" value={t.ctaColor} options={['teal', 'blue']}
          onChange={(v) => setTweak('ctaColor', v)} />
        <TweakSection label="Рух" />
        <TweakToggle label="Анімації" value={motionOn} onChange={(v) => setTweak('animations', v)} />
      </TweaksPanel>
    </div>
    </CCMotionCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#0C2740"/><circle cx="50" cy="42" r="20" fill="none" stroke="#2E9E88" stroke-width="3"/><path d="M30 64 h40 M50 56 v16" stroke="#13548C" stroke-width="4" stroke-linecap="round"/></svg>
</template>
</body>
</html>
