<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row">
  <div class="col"><div class="chip" style="background:var(--cc-primary)"></div><span class="lbl">primary</span></div>
  <div class="col"><div class="chip" style="background:var(--cc-accent)"></div><span class="lbl">accent</span></div>
  <div class="col"><div class="chip" style="background:var(--cc-highlight)"></div><span class="lbl">highlight</span></div>
  <div class="col"><div class="chip" style="background:var(--cc-success)"></div><span class="lbl">success</span></div>
  <div class="col"><div class="chip" style="background:var(--cc-surface);"></div><span class="lbl">surface</span></div>
  <div class="col"><div class="chip" style="background:var(--cc-surface-sunk)"></div><span class="lbl">sunk</span></div>
</div>
<div class="row" style="margin-top:12px;align-items:center;gap:18px">
  <span style="color:var(--cc-link);font-weight:700;font-family:var(--cc-font-body)">Підтримати збір →</span>
  <span class="lbl">link colour</span>
  <span style="flex:1;height:1px;background:var(--cc-line)"></span>
  <span class="lbl">hairline</span>
</div></body></html>
