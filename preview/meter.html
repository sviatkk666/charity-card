<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="font-family:var(--cc-font-body)">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
    <span class="cc-num" style="font-size:26px;color:var(--cc-blue)">7 420 000 <span style="font-size:14px;color:var(--cc-text-3);font-weight:600">грн зібрано</span></span>
    <span class="cc-num" style="font-size:15px;color:var(--cc-teal-deep)">37%</span>
  </div>
  <div style="height:14px;background:var(--cc-meter-track);border-radius:var(--cc-r-pill);overflow:hidden">
    <div style="height:100%;width:37%;background:var(--cc-meter-fill);border-radius:var(--cc-r-pill)"></div>
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:8px">
    <span class="lbl">мета 20 000 000 грн</span>
    <span class="lbl">залишилось 12 580 000 грн</span>
  </div>
</div></body></html>
