<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css"></head>
<body>

    <div style="font-family:var(--cc-font-head);font-weight:800;font-size:18px;color:var(--cc-text)">Освіта</div>

    <div style="font-family:var(--cc-font-head);font-weight:800;font-size:18px;color:var(--cc-text)">Наука</div>
    <div class="lbl" style="margin-top:3px">атом</div>
  </div><div style="flex:1;background:var(--cc-white);border:1px solid var(--cc-line);border-radius:var(--cc-r-md);padding:14px;box-shadow:var(--cc-shadow-sm)">
    <div style="width:26px;height:5px;border-radius:3px;background:var(--cc-teal-deep);margin-bottom:10px"></div>
    <div style="font-family:var(--cc-font-head);font-weight:800;font-size:18px;color:var(--cc-text)">Медицина</div>
