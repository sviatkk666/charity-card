<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="align-items:center;gap:10px">
  <span style="display:inline-flex;align-items:center;gap:6px;background:var(--cc-teal-soft);color:var(--cc-teal-deep);font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--cc-r-pill);font-family:var(--cc-font-body)">● Збір активний</span>
  <span style="background:var(--cc-blue-soft);color:var(--cc-blue-deep);font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--cc-r-pill);font-family:var(--cc-font-body)">Неприбуткова організація</span>
  <span style="background:var(--cc-cream-2);color:var(--cc-text-2);font-weight:600;font-size:13px;padding:6px 12px;border-radius:var(--cc-r-pill);font-family:var(--cc-font-body);border:1px solid var(--cc-line)">ЄДРПОУ · виписка</span>
</div>
<div class="row" style="margin-top:12px;gap:8px">
  <span style="background:var(--cc-amber);color:#3a2a06;font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--cc-r-pill);font-family:var(--cc-font-body)">Терміново</span>
  <span style="background:var(--cc-ink);color:#EAF1F6;font-weight:700;font-size:13px;padding:6px 12px;border-radius:var(--cc-r-pill);font-family:var(--cc-font-body)">ЛНМУ</span>
</div></body></html>
