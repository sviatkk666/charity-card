<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="background:var(--cc-white);border:1px solid var(--cc-line);border-radius:var(--cc-r-lg);box-shadow:var(--cc-shadow-md);padding:18px;font-family:var(--cc-font-body);max-width:340px">
  <div class="cc-overline">РАЗОВИЙ ВНЕСОК</div>
  <div style="display:flex;gap:8px;margin:12px 0">
    <span style="flex:1;text-align:center;padding:10px 0;border-radius:var(--cc-r-sm);border:1.5px solid var(--cc-line);font-weight:700;color:var(--cc-text-2)">200</span>
    <span style="flex:1;text-align:center;padding:10px 0;border-radius:var(--cc-r-sm);border:1.5px solid var(--cc-teal);background:var(--cc-teal-soft);font-weight:800;color:var(--cc-teal-deep)">500</span>
    <span style="flex:1;text-align:center;padding:10px 0;border-radius:var(--cc-r-sm);border:1.5px solid var(--cc-line);font-weight:700;color:var(--cc-text-2)">1000</span>
    <span style="flex:1;text-align:center;padding:10px 0;border-radius:var(--cc-r-sm);border:1.5px solid var(--cc-line);font-weight:700;color:var(--cc-text-3)">грн</span>
  </div>
  <button style="width:100%;background:var(--cc-teal);color:#fff;font-weight:700;font-size:15px;border:none;border-radius:var(--cc-r-pill);padding:13px;box-shadow:var(--cc-shadow-teal);font-family:var(--cc-font-body)">Підтримати збір</button>
</div></body></html>
